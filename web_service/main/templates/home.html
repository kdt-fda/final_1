{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 모바일도 화면 비율 맞추려고 넣는다고 보면 됨' -->
    <title>Open-Q | KOSDAQ 기업 분석</title> <!-- 맨 위에 탭 이름 -->
    <style>
        body { /* body 태그의 스타일 설정 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; /* 글꼴 설정하는 부분 */
            background: linear-gradient(180deg, #D6E4FF 0%, #FFFFFF 30%); /* 화면에 파란 그라데이션 부분,  30% 지점까지 서서히 하얗게 바뀌게 해줌, 그 이후 쭉 흰색*/
            margin: 0; /* body의 여백 부분 설정인데, 그냥 0이 나음*/
            /* 이 아래 부분은 그냥 화면에 유연하게 잘 쌓고, 가운데에 모아두는 부분이라고 생각하면 됨 */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; /* 화면 내용이 적더라도 화면 전체 꽉차게 보이기 위한 설정 */
        }
        /* body 안에 있는 container에 대한 설정, 전부다 가운데 정렬을 시키는 부분*/
        .container { width: 100%; max-width: 850px; text-align: center; margin-top: 100px; padding: 20px; box-sizing: border-box; }
        
        /* 로고 스타일, h1이 제목을 나타내는 태그임*/
        h1 { font-size: 3.5rem; margin-bottom: 15px; letter-spacing: -1px; }
        h1 a { text-decoration: none; color: #000; transition: opacity 0.2s; } /* open-Q에 링크 달아놔서 링크 밑줄 없애고, 검은색 글자색, 마우스 올렸을 때 스르륵 바뀌는 애니메이션 효과 */
        h1 a:hover { opacity: 0.7; } /* 마우스 올리면 투명도를 70%로 낮춤. 이게 위에서 0.2초간 스르륵 바뀌게 해서 애니메이션처럼 보이게 됨 */

        /* 설명 문구 스타일 */
        .description { font-size: 1.3rem; color: #444; line-height: 1.6; margin-bottom: 40px; } /* 로고 아래 설명 문구 스타일 설정 */

        /* 검색창 스타일 */
        .search-container { margin: 50px 0; position: relative; } /* 검색창 여백 및 위치 설정 */
        .search-input {
            width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #ddd; /* 검색창 입력란 여백이랑 모서리 둥글게, 실선 테두리, 색상 설정 */
            font-size: 1.2rem; box-shadow: 0 6px 15px rgba(0,0,0,0.06); outline: none; /* 폰트 크기랑 살짝 그림자 넣기, 입력창 눌렀을 때 검정 테두리 안생기게 none값 */
            font-family: inherit; /* input 설정의 경우 body의 글꼴을 안쓰는 경우가 있어서 inherit을 통해 같은 글꼴 사용하게 만듦 */
        }
        .search-button { /* 돋보기 버튼의 위치 설정, 버튼에 입히는 기본 설정을 none으로 해서 돋보기 아이콘만 딱 보이게 함 */
            position: absolute; right: -35px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; padding: 0; line-height: 0;
        }
        .search-button img {
            width: 28px; height: 28px; display: block; object-fit: contain;
        }

        /* TOP 10 섹션 디자인*/
        .top10-section { text-align: left; margin-top: 60px; width: 100%; }
        .top10-section h3 { font-size: 1.6rem; margin-bottom: 25px; color: #222; } /* 거래대금 TOP10에 대한 스타일 */
        .top10-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(5, auto); grid-auto-flow: column; row-gap: 0; column-gap: 28px; } /* 주식 10개 들어가는 외부 부분 격자 스타일로 */
        
        .stock-item { /* 주식 블록 외부 디자인 */
            display: flex; justify-content: space-between; align-items: center; /* 글자들 세로 방향에서 정중앙에 오게 함*/
            padding: 15px 10px; border-bottom: 1px solid #e9e8e894; /* 각 항목들 아래 회색깔 실선을 줘서 종목 구분하게끔 */
            text-decoration: none; color: inherit; transition: background 0.2s; /* 각 항목들도 링크로 연결해놨기 때문에 링크의 기본 스타일을 없애고, 각 주식 블록에 마우스 가져다 댈 때 배경색이 자연스럽게 바뀌게 함 */
        }
        .stock-item:hover { background-color: rgba(240, 245, 255, 0.5); border-radius: 8px; } /* 이거는 마우스 올려놧을 때 색지정이랑, 블록 모서리를 살짝 둥글게 보여줌 */
        
        /* 주식 블록 내부 디자인 */
        .rank { font-size: 1.2rem; font-weight: bold; margin-right: 15px; color: #888; } /* 각 주식 종목의 순위 부분 스타일 */
        .corp-name { flex-grow: 1; font-weight: 600; font-size: 1.2rem; } /* 각 주식 종목의 기업이름 스타일, 가격박스가 무조건 오른쪽 끝에 보일 수 있게 flex-grow 설정 */
        .price-box { text-align: right; } /* 각 주식 종목의 가격과 등락정보를 담는 박스 */
        .price { font-weight: bold; font-size: 1.1rem; display: block; } /* 실제 주식 가격에 대한 스타일 */
        .fluct { font-size: 0.95rem; margin-top: 3px; display: block; } /* 등락정보 스타일 */
        .up { color: #e74c3c; } /* 빨간색 */
        .down { color: #3498db; } /* 파란색 */
        .flat { color: #888888; } /* 회색 */
    </style>
</head>
<body>

<div class="container">
    <!-- 여기서 중괄호 안에 % url % 안에 주소를 적는건데, main/urls.py 안에 name='home'인 주소를 정의해놔서 거기로 이동하게 되는 것 -->
    <h1><a href="{% url 'home' %}">Open-Q</a></h1> <!-- 여기는 container, body, h1 h1 a의 스타일이 적용되는 것, href가 링크 태그 -->
    
    <div class="description"> <!-- 여기서의 count는 main/views.py 에서 정의해놨기 때문에 바로 사용이 가능한 것. 물론 main/models.py에서도 변형이 필요하긴 함-->
        {{ count }}개의 KOSDAQ 기업 분석 결과를 제공합니다.<br>
        관심 기업의 가치를 알아보세요.
    </div> <!-- 다만 count의 경우 기본적으로 제공하는 것이기 때문에 views.py에서 전달만 해주면 됨, 여기선 전달한 key 값을 명시해 주는 것 -->

    <form action="{% url 'search' %}" method="get" class="search-container"> <!-- 일단은 search에서 query가 1개면 리다이렉트하는 방식임, url에 내가 검색한 단어 주소창에 넣어서 전달하게 됨-->
        <input type="text" name="q" class="search-input" placeholder="기업명/종목코드를 검색하세요" required> <!-- 여기서 q 안에 들어 있는 내용으로 search에서 판단하게 되는 것 -->
        <button type="submit" class="search-button" aria-label="검색">
            <img src="{% static 'main/search.png' %}" alt="">
        </button>
    </form> 

    <div class="top10-section">
        <h3>거래대금 TOP 10 종목 보기</h3>
        <div class="top10-grid">
            {% for stock in top_stocks %}
            <a href="{% url 'overview' stock.code %}" class="stock-item"> <!-- 나중에 요약 페이지로 이동하게 수정하기 -->
                <span class="rank">{{ forloop.counter }}</span>
                <span class="corp-name">{{ stock.name }}</span>
                <div class="price-box">
                    <span class="price">{{ stock.price }}원</span>
                    <span class="fluct {{ stock.css_class }}"> <!-- 여기서 views.py에서 계산한 up, down, flat이 들어감 -->
                        {{ stock.change_text }}
                    </span>
                </div>
            </a>
            {% empty %} <!-- 테이블 비었거나 조회안되는 경우 -->
            <div style="grid-column: span 2; text-align: center; color: #888; padding: 20px;">
                현재 거래 데이터를 불러올 수 없습니다.
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
