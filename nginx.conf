upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # 정적 파일 처리
    location /static/ {
        alias /app/staticfiles/;
    }

    # 미디어 파일 처리
    location /media/ {
        alias /app/mediafiles/;
    }

    # 나머지 요청을 Django로 전달
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }
}